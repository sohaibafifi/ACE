apply plugin: 'java'


//java {
//    toolchain {
//        languageVersion = JavaLanguageVersion.of(11)
//    }
//}

sourceCompatibility = 1.11
targetCompatibility = 1.11

archivesBaseName = "ACE"
version = '2.5'
 
repositories {
 mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'lib', include: ['*.jar'])
    implementation 'org.scijava:native-lib-loader:2.5.0'
    runtimeOnly 'com.ustermetrics:highs4j-native:3.0.0-1.13.1'
    //testImplementation 'junit:junit:4.12'
}

// with this statement below (jar { }), we build a fat jar, i.e. a jar with included dependencies
jar {
    dependsOn testClasses
    manifest {
        attributes(
                'Main-Class': 'main.Head'
        )
    }
    from sourceSets.test.output
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
 }

test {
	//executable = "/path/to/jdk/bin/java"
	
   // show standard out and standard error of the test JVM(s) on the console
  testLogging.showStandardStreams = true
 
   
 // set heap size for the test JVM(s)
  minHeapSize = "128m"
  maxHeapSize = "1024m"
  
  // set JVM arguments for the test JVM(s)
  jvmArgs "-da" 
  jvmArgs "-Xmx12G"  // -d64 
  jvmArgs "--enable-native-access=ALL-UNNAMED"
}

task benchmarkLpVsNoLp(type: JavaExec) {
	group = "verification"
	description = "Benchmark ACE in CP, CP+ROOTLP and CP+LP modes on the same optimization instances, focusing on proof, root bound, gap and nodes."
	dependsOn testClasses
	classpath = sourceSets.test.runtimeClasspath
	mainClass = "problems.BenchmarkLpVsNoLp"
	jvmArgs "-da"
	jvmArgs "-Xmx12G"
	jvmArgs "--enable-native-access=ALL-UNNAMED"
	if (project.hasProperty("benchmarkArgs")) {
		args project.property("benchmarkArgs").toString().trim().split("\\s+").findAll { !it.isEmpty() }
	}
}
